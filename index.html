<!DOCTYPE html>
<html data-theme="light" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navegación a Av. Mistral</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* CSS Variables */
    :root {
      --bg-page: #f5f5f5;
      --bg-panel: #ffffff;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --bg-button: #2563eb;
      --bg-button-hover: #1d4ed8;
      --text-on-button: #ffffff;
      --border: #e5e7eb;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    [data-theme="dark"] {
      --bg-page: #0f172a;
      --bg-panel: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --bg-button: #3b82f6;
      --bg-button-hover: #60a5fa;
      --text-on-button: #ffffff;
      --border: #334155;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-page);
      color: var(--text-primary);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      text-align: center;
      padding: 1.5rem;
      max-width: 400px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
    }

    .start-btn {
      background-color: var(--bg-button);
      color: var(--text-on-button);
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 0.5rem;
      cursor: pointer;
      width: 100%;
      max-width: 280px;
      transition: background-color 0.2s ease;
    }

    .start-btn:hover {
      background-color: var(--bg-button-hover);
    }

    .start-btn:active {
      transform: scale(0.98);
    }

    /* Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background-color: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease, color 0.3s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .theme-toggle:hover {
      box-shadow: 0 4px 12px var(--shadow);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema">☀</button>

  <main>
    <h1>te voy a llevar a una dirección</h1>
    <button class="start-btn" onclick="location.href='page2.html'">Empezar</button>
    <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 2rem;">v1.2 (button fix)</p>
  </main>

  <script>
    // Theme initialization and management
    function applyStoredTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      updateThemeToggleIcon(saved);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeToggleIcon(next);
    }

    function updateThemeToggleIcon(theme) {
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = theme === 'dark' ? '🌙' : '☀';
    }

    // Apply theme on page load
    applyStoredTheme();
  </script>
</body>
</html>
