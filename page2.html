<!DOCTYPE html>
<html data-theme="light" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Navegación GPS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

  <style>
    :root {
      --bg-page: #f5f5f5;
      --bg-panel: #ffffff;
      --bg-topbar: #ffffff;
      --bg-button: #2563eb;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-on-button: #ffffff;
      --accent-arrival: #16a34a;
      --accent-step: #2563eb;
      --border: #e5e7eb;
      --shadow: rgba(0, 0, 0, 0.1);
      --topbar-height: 72px;
      --panel-peek: 130px;
    }

    [data-theme="dark"] {
      --bg-page: #0f172a;
      --bg-panel: #1e293b;
      --bg-topbar: #1e293b;
      --bg-button: #3b82f6;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-on-button: #ffffff;
      --accent-arrival: #4ade80;
      --accent-step: #60a5fa;
      --border: #334155;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-page);
      color: var(--text-primary);
      transition: background-color 0.3s, color 0.3s;
    }

    #map { position: fixed; inset: 0; z-index: 0; }

    [data-theme="dark"] .leaflet-tile-pane {
      filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1);
    }
    [data-theme="dark"] .leaflet-marker-pane img {
      filter: invert(1) hue-rotate(180deg);
    }

    /* Top bar with destination + ETA */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-height);
      background-color: var(--bg-topbar);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem; z-index: 1000;
      box-shadow: 0 2px 8px var(--shadow);
    }

    #topbar-info { flex: 1; }
    #dest-label { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); display: block; }
    #eta-label { font-size: 0.75rem; color: var(--text-secondary); display: block; margin-top: 2px; }

    #theme-toggle {
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      background-color: transparent; border: none;
      color: var(--text-primary); font-size: 1.25rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* Bottom panel */
    #bottom-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background-color: var(--bg-panel);
      border-radius: 20px 20px 0 0;
      padding: 0.75rem 1.25rem 2rem;
      z-index: 1000;
      box-shadow: 0 -4px 16px var(--shadow);
      min-height: var(--panel-peek);
    }

    #panel-handle {
      width: 40px; height: 4px;
      background-color: var(--border);
      border-radius: 2px; margin: 0 auto 0.75rem;
    }

    #step-counter {
      font-size: 0.75rem; color: var(--text-secondary);
      font-weight: 500; margin-bottom: 0.5rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    #step-instruction {
      font-size: 1.15rem; font-weight: 600;
      color: var(--text-primary); line-height: 1.4; margin-bottom: 0.25rem;
    }

    #step-distance {
      font-size: 1rem; color: var(--accent-step); font-weight: 500;
    }

    #step-accuracy {
      font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.4rem;
    }

    /* Locate me */
    #locate-btn {
      position: fixed; bottom: calc(var(--panel-peek) + 1rem); right: 1rem;
      width: 3rem; height: 3rem; border-radius: 50%; border: none;
      background-color: var(--bg-button); color: var(--text-on-button);
      font-size: 1.4rem; cursor: pointer; z-index: 1000;
      box-shadow: 0 2px 8px var(--shadow);
      display: flex; align-items: center; justify-content: center;
    }

    .user-arrow {
      font-size: 1.5rem; color: #2563eb;
      text-shadow: 0 0 6px rgba(37, 99, 235, 0.6);
      transition: transform 0.3s ease;
    }

    /* Arrival popup */
    #arrival-overlay {
      display: none; position: fixed; inset: 0;
      background-color: rgba(0, 0, 0, 0.5); z-index: 1999;
    }
    #arrival-overlay.show { display: block; }

    #arrival-popup {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background-color: var(--bg-panel);
      border-radius: 1rem; padding: 2rem;
      z-index: 2000;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center; max-width: 320px; width: 90%;
    }
    #arrival-popup.show { display: block; }
    #arrival-popup .icon { font-size: 3rem; margin-bottom: 1rem; }
    #arrival-popup h2 { font-size: 1.5rem; color: var(--accent-arrival); margin-bottom: 0.5rem; }
    #arrival-popup p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
    #arrival-popup button {
      background-color: var(--accent-arrival); color: #fff; border: none;
      padding: 0.75rem 2rem; border-radius: 0.5rem;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }

    #error-toast {
      position: fixed; top: calc(var(--topbar-height) + 0.5rem);
      left: 50%; transform: translateX(-50%);
      background-color: #dc2626; color: #fff;
      padding: 0.75rem 1rem; border-radius: 0.5rem;
      font-size: 0.9rem; z-index: 2000;
      max-width: 90vw; text-align: center;
      display: none;
    }
    #error-toast.show { display: block; }

    .leaflet-routing-container { display: none !important; }
  </style>
</head>
<body>
  <header id="topbar">
    <div id="topbar-info">
      <span id="dest-label">Calculando...</span>
      <span id="eta-label"></span>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema">☀</button>
  </header>

  <div id="map"></div>

  <button id="locate-btn" aria-label="Centrar en mi posición">⊕</button>

  <div id="bottom-panel">
    <div id="panel-handle"></div>
    <div id="step-counter">— / —</div>
    <p id="step-instruction">Obteniendo ubicación GPS...</p>
    <p id="step-distance"></p>
    <p id="step-accuracy"></p>
  </div>

  <div id="arrival-overlay"></div>
  <div id="arrival-popup">
    <div class="icon">&#10003;</div>
    <h2>Has llegado al destino</h2>
    <p id="arrival-dest-text"></p>
    <button onclick="location.href='index.html'">Nuevo destino</button>
  </div>

  <div id="error-toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

  <script>
    /* ==================== CONFIG ==================== */
    const ARRIVAL_RADIUS_M = 15;
    const STEP_ADVANCE_RADIUS = 25;
    const LOCATE_ZOOM = 17;
    const WALK_SPEED_KMH = 5;

    /* ==================== STATE ==================== */
    const state = {
      map: null,
      routingControl: null,
      watchId: null,
      userMarker: null,
      steps: [],
      currentStepIdx: 0,
      arrived: false,
      lastPosition: null,
      heading: null,
      destination: null,  // { lat, lng, display_name } from index.html
      routeReady: false,
      gpsReady: false,
    };

    /* ==================== THEME ==================== */
    function applyStoredTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-toggle').textContent = saved === 'dark' ? '🌙' : '☀';
    }

    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '🌙' : '☀';
    }

    /* ==================== MAP ==================== */
    function initMap() {
      state.map = L.map('map', { zoomControl: false }).setView([41.39, 2.16], 13);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap',
      }).addTo(state.map);

      L.control.zoom({ position: 'bottomright' }).addTo(state.map);

      // Destination marker
      L.marker([state.destination.lat, state.destination.lng])
        .addTo(state.map)
        .bindPopup(state.destination.display_name);
    }

    /* ==================== ROUTING ==================== */
    const MANEUVER_ES = {
      'Head': 'Dirígete',
      'Continue': 'Continúa',
      'SlightRight': 'Gira ligeramente a la derecha',
      'Right': 'Gira a la derecha',
      'SharpRight': 'Gira bruscamente a la derecha',
      'Uturn': 'Da media vuelta',
      'SharpLeft': 'Gira bruscamente a la izquierda',
      'Left': 'Gira a la izquierda',
      'SlightLeft': 'Gira ligeramente a la izquierda',
      'WaypointReached': 'Llegaste al punto intermedio',
      'Roundabout': 'En la rotonda',
      'DestinationReached': 'Has llegado a tu destino',
    };

    function formatDistance(meters) {
      return meters >= 1000 ? `${(meters / 1000).toFixed(1)} km` : `${Math.round(meters)} m`;
    }

    function formatDuration(seconds) {
      const mins = Math.round(seconds / 60);
      if (mins < 60) return `${mins} min`;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return m > 0 ? `${h} h ${m} min` : `${h} h`;
    }

    function parseSteps(instructions, coordinates) {
      return instructions.map(instr => {
        const verb = MANEUVER_ES[instr.type] || 'Continúa';
        const road = instr.road ? ` por ${instr.road}` : '';
        const exit = instr.exit ? ` (salida ${instr.exit})` : '';
        let latLng = null;
        if (instr.index != null && coordinates && coordinates[instr.index]) {
          const c = coordinates[instr.index];
          // LRM returns L.LatLng objects (with .lat/.lng), not arrays
          latLng = { lat: c.lat != null ? c.lat : c[0], lng: c.lng != null ? c.lng : c[1] };
        }
        return {
          instruction: `${verb}${road}${exit}`,
          latLng,
          distance: instr.distance || 0,
        };
      });
    }

    function initRouting(originLatLng) {
      if (state.routingControl) {
        state.map.removeControl(state.routingControl);
      }

      const dest = state.destination;

      state.routingControl = L.Routing.control({
        waypoints: [
          L.latLng(originLatLng.lat, originLatLng.lng),
          L.latLng(dest.lat, dest.lng),
        ],
        router: L.Routing.osrmv1({
          serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1',
          profile: 'driving',
        }),
        routeWhileDragging: false,
        addWaypoints: false,
        show: false,
        fitSelectedRoutes: false, // we'll fit manually for better control
        lineOptions: {
          styles: [{ color: '#2563eb', weight: 5, opacity: 0.8 }],
        },
        createMarker: function() { return null; },
      }).addTo(state.map);

      state.routingControl.on('routesfound', function (e) {
        const route = e.routes[0];
        state.steps = parseSteps(route.instructions, route.coordinates);
        state.currentStepIdx = 0;
        state.routeReady = true;

        // Calculate ETA
        const totalDistM = route.summary.totalDistance;
        const osrmDurationS = route.summary.totalTime;
        const walkDurationS = (totalDistM / 1000) / WALK_SPEED_KMH * 3600;

        const now = new Date();
        const etaOsrm = new Date(now.getTime() + osrmDurationS * 1000);
        const etaWalk = new Date(now.getTime() + walkDurationS * 1000);

        const etaOsrmStr = etaOsrm.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        const etaWalkStr = etaWalk.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

        // Update top bar
        document.getElementById('dest-label').textContent = dest.display_name.split(',')[0];
        document.getElementById('eta-label').textContent =
          `${formatDistance(totalDistM)} · Llegada ~${etaOsrmStr} (OSRM) / ~${etaWalkStr} (5km/h)`;

        // Update arrival popup destination text
        document.getElementById('arrival-dest-text').textContent = dest.display_name;

        updateStepUI();

        // Fit map to show both origin and destination with padding
        const bounds = L.latLngBounds(
          [originLatLng.lat, originLatLng.lng],
          [dest.lat, dest.lng]
        );
        state.map.fitBounds(bounds, {
          padding: [60, 40],
          maxZoom: 16,
        });
      });

      state.routingControl.on('routingerror', function () {
        showError('No se pudo calcular la ruta. Comprueba tu conexión.');
      });
    }

    /* ==================== GPS TRACKING ==================== */
    function startTracking() {
      if (!('geolocation' in navigator)) {
        showError('Tu dispositivo no soporta GPS.');
        return;
      }

      state.watchId = navigator.geolocation.watchPosition(
        onPositionUpdate,
        onPositionError,
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
      );
    }

    function onPositionUpdate(pos) {
      try {
        const { latitude: lat, longitude: lng, heading, accuracy } = pos.coords;
        state.lastPosition = pos.coords;
        state.heading = heading;

        updateUserMarker(lat, lng, heading);

        // First GPS fix: calculate route from current position
        if (!state.gpsReady) {
          state.gpsReady = true;
          document.getElementById('step-instruction').textContent = 'Calculando ruta...';
          initRouting({ lat, lng });
        }

        // Arrival check
        if (!state.arrived && state.destination) {
          const dist = haversine(lat, lng, state.destination.lat, state.destination.lng);
          if (dist <= ARRIVAL_RADIUS_M) {
            handleArrival();
            return;
          }
        }

        advanceStepIfNeeded(lat, lng);
        updateAccuracyDisplay(accuracy);
      } catch (err) {
        console.error('onPositionUpdate error:', err);
      }
    }

    function onPositionError(err) {
      const msgs = {
        1: 'Permiso de ubicación denegado. Actívalo en ajustes.',
        2: 'Posición no disponible.',
        3: 'Tiempo agotado. Comprueba señal GPS.',
      };
      showError(msgs[err.code] || 'Error de ubicación.');
    }

    /* ==================== STEP ADVANCEMENT ==================== */
    function advanceStepIfNeeded(lat, lng) {
      if (state.currentStepIdx >= state.steps.length - 1) return;

      // Check ALL remaining steps (not just next) in case user skips some
      let bestIdx = state.currentStepIdx;
      for (let i = state.currentStepIdx + 1; i < state.steps.length; i++) {
        const step = state.steps[i];
        if (!step.latLng) continue;
        const dist = haversine(lat, lng, step.latLng.lat, step.latLng.lng);
        if (dist <= STEP_ADVANCE_RADIUS) {
          bestIdx = i;
        }
      }

      if (bestIdx > state.currentStepIdx) {
        state.currentStepIdx = bestIdx;
        updateStepUI();
        if (navigator.vibrate) navigator.vibrate(100);
      }
    }

    /* ==================== ARRIVAL ==================== */
    function handleArrival() {
      state.arrived = true;
      if (state.watchId !== null) {
        navigator.geolocation.clearWatch(state.watchId);
        state.watchId = null;
      }
      document.getElementById('arrival-overlay').classList.add('show');
      document.getElementById('arrival-popup').classList.add('show');
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }

    /* ==================== UI UPDATES ==================== */
    function updateStepUI() {
      const step = state.steps[state.currentStepIdx];
      if (!step) return;

      // Build instruction with distance context
      const distText = formatDistance(step.distance);
      let fullInstruction = step.instruction;

      // Add "en X metros" context for the current step
      if (step.distance > 0 && state.currentStepIdx < state.steps.length - 1) {
        fullInstruction += ` (${distText})`;
      }

      document.getElementById('step-instruction').textContent = fullInstruction;
      document.getElementById('step-distance').textContent =
        state.currentStepIdx < state.steps.length - 1
          ? `Próximo paso en ${distText}`
          : '';
      document.getElementById('step-counter').textContent =
        `Paso ${state.currentStepIdx + 1} de ${state.steps.length}`;
    }

    function updateUserMarker(lat, lng, heading) {
      const rot = heading != null ? heading : 0;
      const icon = L.divIcon({
        className: '',
        html: `<div class="user-arrow" style="transform:rotate(${rot}deg)">&#9650;</div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 16],
      });
      if (!state.userMarker) {
        state.userMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(state.map);
      } else {
        state.userMarker.setLatLng([lat, lng]).setIcon(icon);
      }
    }

    function updateAccuracyDisplay(accuracy) {
      const el = document.getElementById('step-accuracy');
      if (accuracy > 50) {
        el.textContent = `Señal GPS débil (${Math.round(accuracy)}m)`;
        el.style.color = '#f59e0b';
      } else {
        el.textContent = '';
      }
    }

    function showError(msg) {
      const toast = document.getElementById('error-toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 6000);
    }

    /* ==================== HAVERSINE ==================== */
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    /* ==================== LOCATE BUTTON ==================== */
    document.getElementById('locate-btn').addEventListener('click', () => {
      if (state.lastPosition) {
        state.map.setView(
          [state.lastPosition.latitude, state.lastPosition.longitude],
          LOCATE_ZOOM, { animate: true }
        );
      }
    });

    /* ==================== BOOT ==================== */
    document.addEventListener('DOMContentLoaded', () => {
      applyStoredTheme();

      // Read destination from localStorage (set by index.html)
      const destJson = localStorage.getItem('destination');
      if (!destJson) {
        showError('No se ha indicado destino.');
        setTimeout(() => location.href = 'index.html', 2000);
        return;
      }

      try {
        state.destination = JSON.parse(destJson);
      } catch (e) {
        location.href = 'index.html';
        return;
      }

      // Update top bar with destination name
      document.getElementById('dest-label').textContent = state.destination.display_name.split(',')[0];

      // Init map and start GPS
      initMap();
      startTracking();
    });
  </script>
</body>
</html>
